name: nearby-shop

services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: nearby_shop
      MYSQL_PASSWORD: nearby_shop_dev
      MYSQL_ROOT_PASSWORD: nearby_shop_root_dev
      MYSQL_USER: nearby_shop
      TZ: Asia/Shanghai
    ports:
      - '3306:3306'
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', '127.0.0.1', '-unearby_shop', '-pnearby_shop_dev']
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 20s
    restart: unless-stopped

  redis:
    image: redis:7.4-alpine
    command: ['redis-server', '--appendonly', 'yes']
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

volumes:
  mysql-data:
  redis-data:

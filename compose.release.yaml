name: nearby-shop-release

x-server-environment: &server-environment
  NODE_ENV: production
  PORT: 3000
  DATABASE_URL: mysql://${MYSQL_USER:?MYSQL_USER is required}:${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}@mysql:3306/${MYSQL_DATABASE:?MYSQL_DATABASE is required}
  REDIS_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis:6379
  JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
  TRUST_PROXY: 'true'
  RATE_LIMIT_ENABLED: 'true'
  RATE_LIMIT_WINDOW_MS: 60000
  RATE_LIMIT_MAX_REQUESTS: 600
  AUTH_RATE_LIMIT_MAX_REQUESTS: 20
  CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://www.surroundsmallshops.com}
  EXPIRED_ORDER_JOB_ENABLED: 'true'
  NOTIFICATION_JOB_ENABLED: 'true'
  WECHAT_MINIPROGRAM_STATE: developer

services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:?MYSQL_DATABASE is required}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
      MYSQL_USER: ${MYSQL_USER:?MYSQL_USER is required}
      TZ: Asia/Shanghai
    expose:
      - '3306'
    volumes:
      - release-mysql-data:/var/lib/mysql
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'MYSQL_PWD="$$MYSQL_PASSWORD" mysqladmin ping -h 127.0.0.1 -u "$$MYSQL_USER" --silent',
        ]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 20s
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - backend

  redis:
    image: redis:7.4-alpine
    command: ['sh', '-c', 'exec redis-server --appendonly yes --requirepass "$$REDIS_PASSWORD"']
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    expose:
      - '6379'
    volumes:
      - release-redis-data:/data
    healthcheck:
      test: ['CMD-SHELL', 'REDISCLI_AUTH="$$REDIS_PASSWORD" redis-cli ping | grep PONG']
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - backend

  migrate:
    build:
      context: .
      dockerfile: server/Dockerfile
      target: migrate
      network: host
    environment: *server-environment
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: 'no'
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    networks:
      - backend

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
      target: runtime
      network: host
    environment: *server-environment
    depends_on:
      migrate:
        condition: service_completed_successfully
    expose:
      - '3000'
    ports:
      - 127.0.0.1:${RELEASE_API_PORT:-3100}:3000
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:3000/api/v1/health').then((response)=>{if(!response.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    networks:
      - frontend
      - backend

  admin-web:
    build:
      context: .
      dockerfile: admin-web/Dockerfile
      target: runtime
      network: host
      args:
        VITE_API_BASE_URL: ${ADMIN_API_BASE_URL:-https://api.surroundsmallshops.com/api/v1}
    depends_on:
      server:
        condition: service_healthy
    ports:
      - 127.0.0.1:${RELEASE_HTTP_PORT:-8080}:8080
    healthcheck:
      test: ['CMD', 'wget', '-q', '-O', '/dev/null', 'http://127.0.0.1:8080/']
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    networks:
      - frontend
      - backend

networks:
  frontend:
  backend:
    internal: true

volumes:
  release-mysql-data:
  release-redis-data:
